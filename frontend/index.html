<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIAMS — Gestione Agricola</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Flatpickr date picker -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" />
</head>
<body>

  <div class="app-shell d-flex">

    <!-- Backdrop sidebar mobile -->
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <!-- SIDEBAR -->
    <aside id="app-sidebar" class="bg-black text-light p-3 d-flex flex-column">
      <div class="sidebar-header text-center mb-4">
        <img src="assets/GiaMarVerticaleSideBar.png" alt="Gia.Mar" class="sidebar-logo-img" />
        <div class="sidebar-app-name">GIAMS</div>
        <div class="app-version">v1.7.9</div>
      </div>

      <nav class="nav flex-column gap-2">
        <button id="menu-home" class="btn btn-dark text-start sidebar-link active" type="button">
          <i class="fa-solid fa-house me-2"></i> Home
        </button>

        <button id="menu-dashboard" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-chart-pie me-2"></i> Dashboard
        </button>

        <button id="menu-parcelle" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-seedling me-2"></i> Gestione Parcelle
        </button>

        <button id="menu-produzione" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-oil-can me-2"></i> Produzione
        </button>

        <button id="menu-contenitori" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-bottle-water me-2"></i> Contenitori
        </button>

        <button id="menu-clienti" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-address-book me-2"></i> Clienti
        </button>

        <button id="menu-fornitori" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-truck-field me-2"></i> Fornitori
        </button>

        <button id="menu-costi" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-file-invoice-dollar me-2"></i> Costi
        </button>

        <button id="menu-magazzino" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-warehouse me-2"></i> Magazzino
        </button>

        <button id="menu-vendite" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-cart-shopping me-2"></i> Vendite
        </button>

        <button id="menu-utenti" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-user-gear me-2"></i> Gestione Utenti
        </button>

        <button id="menu-audit" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-clock-rotate-left me-2"></i> Log Attivita'
        </button>
      </nav>

      <div class="mt-auto pt-3">
        <hr class="border-secondary mb-3" />
        <div class="d-flex align-items-center small text-secondary mb-3" id="user-box">
          <div class="me-2"><i class="fa-solid fa-circle-user fa-lg"></i></div>
          <div class="d-flex flex-column">
            <span class="text-uppercase" style="font-size: 0.7rem;">Utente</span>
            <span id="current-username" class="fw-semibold">–</span>
          </div>
        </div>
        <button id="menu-logout" class="btn btn-outline-danger w-100" type="button">
          <i class="fa-solid fa-right-from-bracket me-2"></i> Esci
        </button>
      </div>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="main-wrapper flex-grow-1 d-flex flex-column">
      <!-- Topbar -->
      <div class="content-topbar">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Toggle menu">
          <span class="hamburger-box">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
          </span>
        </button>
        <div class="topbar-text">
          <span id="topbar-title" class="topbar-title"></span>
          <span id="topbar-subtitle" class="topbar-subtitle"></span>
        </div>
        <div id="topbar-actions" class="topbar-actions"></div>
      </div>
      <!-- MAIN CONTENT -->
      <main id="main-content" class="flex-grow-1 p-4 overflow-auto">
      </main>
    </div>

  </div>


  <!-- ========================================= -->
  <!-- TEMPLATES -->
  <!-- ========================================= -->

  <!-- TEMPLATE: PARCELLE LISTA -->
  <template id="template-parcelle">
    <div class="module-header mb-3">
      <button class="btn btn-accent" id="btn-nuova-parcella">
        <i class="fa-solid fa-plus me-1"></i> Nuova Parcella
      </button>
    </div>

    <!-- Statistiche rapide -->
    <div class="row g-3 mb-4" id="parcelle-stats-row">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-parcelle">0</div>
          <div class="stat-label">Parcelle</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-ettari">0</div>
          <div class="stat-label">Ettari</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-piante">0</div>
          <div class="stat-label">Piante</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-produttive">0</div>
          <div class="stat-label">Produttive</div>
        </div>
      </div>
    </div>

    <!-- Filtri -->
    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <input type="text" class="form-control form-control-sm" id="filtro-q" placeholder="Cerca nome o codice..." />
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filtro-varieta">
            <option value="">Tutte le varieta'</option>
            <option value="Canino">Canino</option>
            <option value="Leccino">Leccino</option>
            <option value="Frantoio">Frantoio</option>
            <option value="Moraiolo">Moraiolo</option>
            <option value="Pendolino">Pendolino</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filtro-stato">
            <option value="">Tutti gli stati</option>
            <option value="produttivo">Produttivo</option>
            <option value="giovane">Giovane</option>
            <option value="riposo">In riposo</option>
            <option value="dismesso">Dismesso</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary btn-sm w-100" id="btn-filtra-parcelle">
            <i class="fa-solid fa-filter me-1"></i> Filtra
          </button>
        </div>
      </div>
    </div>


    <!-- Tabella -->
    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>Codice</th>
              <th>Nome</th>
              <th>Ettari</th>
              <th>Varieta'</th>
              <th>Piante</th>
              <th>Anno</th>
              <th>Stato</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="parcelle-tbody"></tbody>
        </table>
      </div>
      <div class="pagination-wrapper px-3 pb-2">
        <span class="pagination-info" id="parcelle-page-info"></span>
        <div class="pagination-controls" id="parcelle-pagination"></div>
      </div>
    </div>
  </template>

  <!-- TEMPLATE: PARCELLA FORM -->
  <template id="template-parcella-form">
    <div class="mb-3">
      <button class="btn btn-outline-secondary btn-sm" id="btn-torna-lista">
        <i class="fa-solid fa-arrow-left me-1"></i> Torna alla lista
      </button>
    </div>

    <h3 class="module-title mb-3" id="form-parcella-titolo">Nuova Parcella</h3>

    <form id="parcella-form">
      <div class="row g-4">
        <!-- Colonna sinistra: dati principali -->
        <div class="col-lg-6">
          <div class="card p-3">
            <h5 class="card-section-title mb-3">Dati Parcella</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Codice *</label>
                <input type="text" class="form-control form-control-sm" id="p-codice" required />
              </div>
              <div class="col-6">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control form-control-sm" id="p-nome" required />
              </div>
              <div class="col-6">
                <label class="form-label">Superficie (ettari) *</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="p-superficie" required />
              </div>
              <div class="col-6">
                <label class="form-label">N. Piante *</label>
                <input type="number" class="form-control form-control-sm" id="p-num-piante" required />
              </div>
              <div class="col-6">
                <label class="form-label">Varieta' Principale *</label>
                <select class="form-select form-select-sm" id="p-varieta-principale" required>
                  <option value="">Seleziona...</option>
                  <option value="Canino">Canino</option>
                  <option value="Leccino">Leccino</option>
                  <option value="Frantoio">Frantoio</option>
                  <option value="Moraiolo">Moraiolo</option>
                  <option value="Pendolino">Pendolino</option>
                  <option value="Altro">Altro</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Varieta' Secondaria</label>
                <select class="form-select form-select-sm" id="p-varieta-secondaria">
                  <option value="">Nessuna</option>
                  <option value="Canino">Canino</option>
                  <option value="Leccino">Leccino</option>
                  <option value="Frantoio">Frantoio</option>
                  <option value="Moraiolo">Moraiolo</option>
                  <option value="Pendolino">Pendolino</option>
                  <option value="Altro">Altro</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Anno Impianto</label>
                <input type="number" class="form-control form-control-sm" id="p-anno-impianto" />
              </div>
              <div class="col-6">
                <label class="form-label">Stato</label>
                <select class="form-select form-select-sm" id="p-stato">
                  <option value="produttivo">Produttivo</option>
                  <option value="giovane">Giovane</option>
                  <option value="riposo">In riposo</option>
                  <option value="dismesso">Dismesso</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Colonna destra: terreno -->
        <div class="col-lg-6">
          <div class="card p-3">
            <h5 class="card-section-title mb-3">Caratteristiche Terreno</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Sistema Irrigazione</label>
                <select class="form-select form-select-sm" id="p-irrigazione">
                  <option value="">Nessuno</option>
                  <option value="goccia">A goccia</option>
                  <option value="aspersione">Aspersione</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Tipo Terreno</label>
                <select class="form-select form-select-sm" id="p-tipo-terreno">
                  <option value="">Non specificato</option>
                  <option value="argilloso">Argilloso</option>
                  <option value="sabbioso">Sabbioso</option>
                  <option value="misto">Misto</option>
                  <option value="calcareo">Calcareo</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Esposizione</label>
                <select class="form-select form-select-sm" id="p-esposizione">
                  <option value="">Non specificata</option>
                  <option value="nord">Nord</option>
                  <option value="sud">Sud</option>
                  <option value="est">Est</option>
                  <option value="ovest">Ovest</option>
                  <option value="pianura">Pianura</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Altitudine (m)</label>
                <input type="number" class="form-control form-control-sm" id="p-altitudine" />
              </div>
              <div class="col-12">
                <label class="form-label">Note</label>
                <textarea class="form-control form-control-sm" id="p-note" rows="3"></textarea>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-accent flex-grow-1">
              <i class="fa-solid fa-floppy-disk me-1"></i> Salva
            </button>
            <button type="button" class="btn btn-outline-secondary" id="btn-annulla-form">
              Annulla
            </button>
          </div>
        </div>
      </div>
    </form>
  </template>

  <!-- TEMPLATE: UTENTI -->
  <template id="template-utenti">
    <div class="module-header mb-3"></div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card p-0">
          <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Username</th>
                  <th>Ruolo</th>
                  <th>Stato</th>
                  <th>Azioni</th>
                </tr>
              </thead>
              <tbody id="utenti-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card p-3">
          <h5 class="card-section-title mb-3" id="form-utente-titolo">Nuovo Utente</h5>
          <form id="utente-form">
            <div class="mb-3">
              <label class="form-label">Username *</label>
              <input type="text" class="form-control form-control-sm" id="u-username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password *</label>
              <input type="password" class="form-control form-control-sm" id="u-password" required minlength="8" />
            </div>
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="u-attivo" checked />
              <label class="form-check-label" for="u-attivo">Attivo</label>
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="u-admin" />
              <label class="form-check-label" for="u-admin">Amministratore</label>
            </div>
            <button type="submit" class="btn btn-accent w-100">
              <i class="fa-solid fa-floppy-disk me-1"></i> Salva
            </button>
            <button type="button" class="btn btn-outline-secondary w-100 mt-2" id="btn-reset-utente">
              Annulla
            </button>
          </form>
        </div>
      </div>
    </div>
  </template>


  <!-- TEMPLATE: PRODUZIONE (tabs Raccolte / Lotti / Confezionamento) -->
  <template id="template-produzione">
    <div class="module-header mb-3"></div>

    <!-- Tabs -->
    <ul class="nav nav-tabs produzione-tabs mb-4">
      <li class="nav-item">
        <button class="nav-link active" id="tab-raccolte" type="button">
          <i class="fa-solid fa-hands-holding me-1"></i> Raccolte
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tab-lotti" type="button">
          <i class="fa-solid fa-bottle-droplet me-1"></i> Lotti Olio
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tab-confezionamento" type="button">
          <i class="fa-solid fa-wine-bottle me-1"></i> Confezionamento
        </button>
      </li>
    </ul>

    <div id="produzione-content"></div>
  </template>

  <!-- TEMPLATE: RACCOLTE LISTA -->
  <template id="template-raccolte-lista">
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-accent" id="btn-nuova-raccolta">
        <i class="fa-solid fa-plus me-1"></i> Nuova Raccolta
      </button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-raccolte">0</div>
          <div class="stat-label">Raccolte</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-kg-olive">0</div>
          <div class="stat-label">Kg Olive</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-media-kg">0</div>
          <div class="stat-label">Media Kg</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-costo-raccolte">0</div>
          <div class="stat-label">Costo Totale</div>
        </div>
      </div>
    </div>

    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Anno Campagna</label>
          <select class="form-select form-select-sm" id="filtro-raccolte-anno">
            <option value="">Tutti</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label small">Parcella</label>
          <select class="form-select form-select-sm" id="filtro-raccolte-parcella">
            <option value="">Tutte</option>
          </select>
        </div>
        <div class="col-md-4">
          <button class="btn btn-outline-secondary btn-sm w-100" id="btn-filtra-raccolte">
            <i class="fa-solid fa-filter me-1"></i> Filtra
          </button>
        </div>
      </div>
    </div>

    <input type="text" class="form-control form-control-sm search-table mb-3" id="search-raccolte" placeholder="Cerca..." style="max-width:300px;" />

    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>Codice</th>
              <th>Data</th>
              <th>Parcelle</th>
              <th>Kg Olive</th>
              <th>Metodo</th>
              <th>Maturazione</th>
              <th>Costo</th>
              <th>Lotto</th>
              <th>Resa</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="raccolte-tbody"></tbody>
        </table>
      </div>
      <div class="pagination-wrapper px-3 pb-2">
        <span class="pagination-info" id="raccolte-page-info"></span>
        <div class="pagination-controls" id="raccolte-pagination"></div>
      </div>
    </div>
  </template>

  <!-- TEMPLATE: RACCOLTA FORM -->
  <template id="template-raccolta-form">
    <div class="mb-3">
      <button class="btn btn-outline-secondary btn-sm" id="btn-torna-raccolte">
        <i class="fa-solid fa-arrow-left me-1"></i> Torna alle raccolte
      </button>
    </div>

    <h3 class="module-title mb-3" id="form-raccolta-titolo">Nuova Raccolta</h3>

    <form id="raccolta-form">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card p-3">
            <h5 class="card-section-title mb-3">Dati Raccolta</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Codice</label>
                <input type="text" class="form-control form-control-sm" id="r-codice" readonly placeholder="Generato automaticamente" />
              </div>
              <div class="col-6">
                <label class="form-label">Data Raccolta *</label>
                <input type="text" class="form-control form-control-sm flatpickr-date" id="r-data" required />
              </div>
              <div class="col-6">
                <label class="form-label">Anno Campagna *</label>
                <input type="number" class="form-control form-control-sm" id="r-anno" required value="2026" />
              </div>
              <div class="col-6">
                <label class="form-label">Kg Olive Totali *</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="r-kg-totali" required />
              </div>
              <div class="col-6">
                <label class="form-label">Metodo Raccolta *</label>
                <select class="form-select form-select-sm" id="r-metodo" required>
                  <option value="">Seleziona...</option>
                  <option value="manuale">Manuale</option>
                  <option value="meccanico">Meccanico</option>
                  <option value="misto">Misto</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Maturazione *</label>
                <select class="form-select form-select-sm" id="r-maturazione" required>
                  <option value="">Seleziona...</option>
                  <option value="verde">Verde</option>
                  <option value="invaiato">Invaiato</option>
                  <option value="maturo">Maturo</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Note</label>
                <textarea class="form-control form-control-sm" id="r-note" rows="2"></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card p-3 mb-3">
            <h5 class="card-section-title mb-3">Parcelle Raccolte</h5>
            <div id="raccolta-parcelle-container"></div>
          </div>

          <div class="card p-3">
            <h5 class="card-section-title mb-3">Costi Raccolta</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">N. Operai</label>
                <input type="number" class="form-control form-control-sm" id="r-num-operai" />
              </div>
              <div class="col-6">
                <label class="form-label">Ore Lavoro</label>
                <input type="number" step="0.5" class="form-control form-control-sm" id="r-ore-lavoro" />
              </div>
              <div class="col-6">
                <label class="form-label">Costo Manodopera (&euro;)</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="r-costo-manodopera" />
              </div>
              <div class="col-6">
                <label class="form-label">Costo Noleggio (&euro;)</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="r-costo-noleggio" />
              </div>

          <h5><i class="fa-solid fa-chart-pie me-2"></i>Dettaglio Costi per Categoria <span class="text-muted small" id="dash-dettaglio-costi-anno"></span></h5>
          <div class="row mb-3">
            <div class="col-md-4">
              <div class="stat-card">
                <div class="stat-label">Costi Campagna</div>
                <div class="stat-value" id="dash-det-costi-campagna">&euro; 0</div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="stat-card">
                <div class="stat-label">Costi Strutturali (competenza)</div>
                <div class="stat-value" id="dash-det-costi-strutturali">&euro; 0</div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="stat-card">
                <div class="stat-label">Totale Costi</div>
                <div class="stat-value" id="dash-det-costi-totale">&euro; 0</div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-lg-7">
              <div class="table-responsive">
                <table class="table table-sm table-dark dashboard-table" id="dash-table-dettaglio-costi">
                  <thead><tr><th>Categoria</th><th>Tipo</th><th class="text-end">Importo</th><th class="text-end">%</th></tr></thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
            <div class="col-lg-5">
              <div class="chart-container"><canvas id="chart-dettaglio-costi"></canvas></div>
            </div>
          </div>
        </div>
      </div>

      <!-- TAB 3: Clienti & Magazzino -->
      <div class="dash-tab-content" id="dash-panel-commerciale">
        <div class="dashboard-section mb-4">
          <h5><i class="fa-solid fa-ranking-star me-2"></i>Top Clienti per Fatturato <span class="text-muted small" id="dash-top-clienti-anno"></span></h5>
          <div class="row">
            <div class="col-lg-7">
              <div class="table-responsive">
                <table class="table table-sm table-dark dashboard-table" id="dash-table-top-clienti">
                  <thead><tr><th>#</th><th>Cliente</th><th class="text-end">N. Vendite</th><th class="text-end">Fatturato</th><th class="text-end">Incassato</th></tr></thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
            <div class="col-lg-5">
              <div class="chart-container"><canvas id="chart-top-clienti"></canvas></div>
            </div>
          </div>
        </div>

        <div class="dashboard-section mb-4">
          <h5><i class="fa-solid fa-warehouse me-2"></i>Giacenza Magazzino</h5>
          <div class="table-responsive">
            <table class="table table-sm table-dark dashboard-table" id="dash-table-giacenza">
              <thead><tr><th>Confezionamento</th><th>Formato</th><th class="text-end">Capacita' (Lt)</th><th class="text-end">Carichi</th><th class="text-end">Scarichi</th><th class="text-end">Giacenza (unita')</th><th class="text-end">Giacenza (Lt)</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </template>

  <!-- Modale conferma duplicato P.IVA / Codice Fiscale -->
  <div class="modal fade" id="modal-duplicato" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light border-warning">
        <div class="modal-header border-warning">
          <h5 class="modal-title text-warning"><i class="fa-solid fa-triangle-exclamation me-2"></i>Attenzione — Possibile duplicato</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="modal-duplicato-msg" class="mb-0"></p>
        </div>
        <div class="modal-footer border-warning">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
          <button type="button" class="btn btn-warning" id="modal-duplicato-forza">Forza inserimento</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/it.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="app.js"></script>

  <!-- Loading overlay globale -->
  <div id="loading-overlay" class="loading-overlay" style="display:none">
    <div class="loading-spinner">
      <div class="spinner-border text-success" role="status"></div>
      <div class="loading-text mt-2">Caricamento...</div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Modal PDF Viewer -->
  <div class="modal fade" id="modal-pdf-viewer" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered" style="max-width:90vw;">
      <div class="modal-content bg-dark">
        <div class="modal-header border-secondary py-2">
          <h6 class="modal-title" id="modal-pdf-title">Documento</h6>
          <div class="ms-auto d-flex gap-2">
            <button class="btn btn-sm btn-outline-light" id="btn-pdf-stampa" title="Stampa">
              <i class="fa-solid fa-print me-1"></i> Stampa
            </button>
            <button class="btn btn-sm btn-accent" id="btn-pdf-download" title="Download">
              <i class="fa-solid fa-download me-1"></i> Scarica
            </button>
            <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">
              <i class="fa-solid fa-times"></i>
            </button>
          </div>
        </div>
        <div class="modal-body p-0">
          <iframe id="pdf-viewer-iframe" style="width:100%;height:80vh;border:none;background:#1a1a1a;"></iframe>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
