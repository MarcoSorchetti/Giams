<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIAMS — Gestione Agricola</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-shell d-flex">

    <!-- SIDEBAR -->
    <aside id="app-sidebar" class="bg-black text-light p-3 d-flex flex-column" style="width:260px;">
      <div class="text-center mb-4">
        <img src="assets/GiaMarVerticaleSideBar.png" alt="Gia.Mar" class="sidebar-logo-img" />
        <div class="sidebar-app-name">GIAMS</div>
        <div class="app-version">v1.1.0</div>
      </div>

      <nav class="nav flex-column gap-2">
        <button id="menu-home" class="btn btn-dark text-start sidebar-link active" type="button">
          <i class="fa-solid fa-house me-2"></i> Home
        </button>

        <button id="menu-parcelle" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-seedling me-2"></i> Gestione Parcelle
        </button>

        <button id="menu-produzione" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-oil-can me-2"></i> Produzione
        </button>

        <button id="menu-contenitori" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-bottle-water me-2"></i> Contenitori
        </button>

        <button id="menu-clienti" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-address-book me-2"></i> Clienti
        </button>

        <button class="btn btn-dark text-start sidebar-link disabled" type="button">
          <i class="fa-solid fa-warehouse me-2"></i> Magazzino (prossimamente)
        </button>

        <button class="btn btn-dark text-start sidebar-link disabled" type="button">
          <i class="fa-solid fa-cart-shopping me-2"></i> Vendite (prossimamente)
        </button>

        <button id="menu-utenti" class="btn btn-dark text-start sidebar-link" type="button">
          <i class="fa-solid fa-user-gear me-2"></i> Gestione Utenti
        </button>
      </nav>

      <div class="mt-auto pt-3">
        <hr class="border-secondary mb-3" />
        <div class="d-flex align-items-center small text-secondary mb-3" id="user-box">
          <div class="me-2"><i class="fa-solid fa-circle-user fa-lg"></i></div>
          <div class="d-flex flex-column">
            <span class="text-uppercase" style="font-size: 0.7rem;">Utente</span>
            <span id="current-username" class="fw-semibold">–</span>
          </div>
        </div>
        <button id="menu-logout" class="btn btn-outline-danger w-100" type="button">
          <i class="fa-solid fa-right-from-bracket me-2"></i> Esci
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="flex-grow-1 p-4 overflow-auto"></main>

  </div>


  <!-- ========================================= -->
  <!-- TEMPLATES -->
  <!-- ========================================= -->

  <!-- TEMPLATE: PARCELLE LISTA -->
  <template id="template-parcelle">
    <div class="module-header mb-3">
      <div>
        <h2 class="module-title mb-1">Gestione Parcelle</h2>
        <div class="module-subtitle">Terreni e oliveti · Ricerca avanzata</div>
      </div>
      <button class="btn btn-accent" id="btn-nuova-parcella">
        <i class="fa-solid fa-plus me-1"></i> Nuova Parcella
      </button>
    </div>

    <!-- Statistiche rapide -->
    <div class="row g-3 mb-4" id="parcelle-stats-row">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-parcelle">0</div>
          <div class="stat-label">Parcelle</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-ettari">0</div>
          <div class="stat-label">Ettari</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-piante">0</div>
          <div class="stat-label">Piante</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-produttive">0</div>
          <div class="stat-label">Produttive</div>
        </div>
      </div>
    </div>

    <!-- Filtri -->
    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <input type="text" class="form-control form-control-sm" id="filtro-q" placeholder="Cerca nome o codice..." />
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filtro-varieta">
            <option value="">Tutte le varieta'</option>
            <option value="Canino">Canino</option>
            <option value="Leccino">Leccino</option>
            <option value="Frantoio">Frantoio</option>
            <option value="Moraiolo">Moraiolo</option>
            <option value="Pendolino">Pendolino</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select form-select-sm" id="filtro-stato">
            <option value="">Tutti gli stati</option>
            <option value="produttivo">Produttivo</option>
            <option value="giovane">Giovane</option>
            <option value="riposo">In riposo</option>
            <option value="dismesso">Dismesso</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary btn-sm w-100" id="btn-filtra-parcelle">
            <i class="fa-solid fa-filter me-1"></i> Filtra
          </button>
        </div>
      </div>
    </div>

    <!-- Tabella -->
    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>Codice</th>
              <th>Nome</th>
              <th>Ettari</th>
              <th>Varieta'</th>
              <th>Piante</th>
              <th>Anno</th>
              <th>Stato</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="parcelle-tbody"></tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- TEMPLATE: PARCELLA FORM -->
  <template id="template-parcella-form">
    <div class="mb-3">
      <button class="btn btn-outline-secondary btn-sm" id="btn-torna-lista">
        <i class="fa-solid fa-arrow-left me-1"></i> Torna alla lista
      </button>
    </div>

    <h3 class="module-title mb-3" id="form-parcella-titolo">Nuova Parcella</h3>

    <form id="parcella-form">
      <div class="row g-4">
        <!-- Colonna sinistra: dati principali -->
        <div class="col-lg-6">
          <div class="card p-3">
            <h5 class="card-section-title mb-3">Dati Parcella</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Codice *</label>
                <input type="text" class="form-control form-control-sm" id="p-codice" required />
              </div>
              <div class="col-6">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control form-control-sm" id="p-nome" required />
              </div>
              <div class="col-6">
                <label class="form-label">Superficie (ettari) *</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="p-superficie" required />
              </div>
              <div class="col-6">
                <label class="form-label">N. Piante *</label>
                <input type="number" class="form-control form-control-sm" id="p-num-piante" required />
              </div>
              <div class="col-6">
                <label class="form-label">Varieta' Principale *</label>
                <select class="form-select form-select-sm" id="p-varieta-principale" required>
                  <option value="">Seleziona...</option>
                  <option value="Canino">Canino</option>
                  <option value="Leccino">Leccino</option>
                  <option value="Frantoio">Frantoio</option>
                  <option value="Moraiolo">Moraiolo</option>
                  <option value="Pendolino">Pendolino</option>
                  <option value="Altro">Altro</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Varieta' Secondaria</label>
                <select class="form-select form-select-sm" id="p-varieta-secondaria">
                  <option value="">Nessuna</option>
                  <option value="Canino">Canino</option>
                  <option value="Leccino">Leccino</option>
                  <option value="Frantoio">Frantoio</option>
                  <option value="Moraiolo">Moraiolo</option>
                  <option value="Pendolino">Pendolino</option>
                  <option value="Altro">Altro</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Anno Impianto</label>
                <input type="number" class="form-control form-control-sm" id="p-anno-impianto" />
              </div>
              <div class="col-6">
                <label class="form-label">Stato</label>
                <select class="form-select form-select-sm" id="p-stato">
                  <option value="produttivo">Produttivo</option>
                  <option value="giovane">Giovane</option>
                  <option value="riposo">In riposo</option>
                  <option value="dismesso">Dismesso</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Colonna destra: terreno -->
        <div class="col-lg-6">
          <div class="card p-3">
            <h5 class="card-section-title mb-3">Caratteristiche Terreno</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Sistema Irrigazione</label>
                <select class="form-select form-select-sm" id="p-irrigazione">
                  <option value="">Nessuno</option>
                  <option value="goccia">A goccia</option>
                  <option value="aspersione">Aspersione</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Tipo Terreno</label>
                <select class="form-select form-select-sm" id="p-tipo-terreno">
                  <option value="">Non specificato</option>
                  <option value="argilloso">Argilloso</option>
                  <option value="sabbioso">Sabbioso</option>
                  <option value="misto">Misto</option>
                  <option value="calcareo">Calcareo</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Esposizione</label>
                <select class="form-select form-select-sm" id="p-esposizione">
                  <option value="">Non specificata</option>
                  <option value="nord">Nord</option>
                  <option value="sud">Sud</option>
                  <option value="est">Est</option>
                  <option value="ovest">Ovest</option>
                  <option value="pianura">Pianura</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Altitudine (m)</label>
                <input type="number" class="form-control form-control-sm" id="p-altitudine" />
              </div>
              <div class="col-12">
                <label class="form-label">Note</label>
                <textarea class="form-control form-control-sm" id="p-note" rows="3"></textarea>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-accent flex-grow-1">
              <i class="fa-solid fa-floppy-disk me-1"></i> Salva
            </button>
            <button type="button" class="btn btn-outline-secondary" id="btn-annulla-form">
              Annulla
            </button>
          </div>
        </div>
      </div>
    </form>
  </template>

  <!-- TEMPLATE: UTENTI -->
  <template id="template-utenti">
    <div class="module-header mb-3">
      <div>
        <h2 class="module-title mb-1">Gestione Utenti</h2>
        <div class="module-subtitle">Amministrazione accessi piattaforma</div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card p-0">
          <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Username</th>
                  <th>Stato</th>
                  <th>Azioni</th>
                </tr>
              </thead>
              <tbody id="utenti-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card p-3">
          <h5 class="card-section-title mb-3" id="form-utente-titolo">Nuovo Utente</h5>
          <form id="utente-form">
            <div class="mb-3">
              <label class="form-label">Username *</label>
              <input type="text" class="form-control form-control-sm" id="u-username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password *</label>
              <input type="password" class="form-control form-control-sm" id="u-password" required minlength="8" />
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="u-attivo" checked />
              <label class="form-check-label" for="u-attivo">Attivo</label>
            </div>
            <button type="submit" class="btn btn-accent w-100">
              <i class="fa-solid fa-floppy-disk me-1"></i> Salva
            </button>
            <button type="button" class="btn btn-outline-secondary w-100 mt-2" id="btn-reset-utente">
              Annulla
            </button>
          </form>
        </div>
      </div>
    </div>
  </template>


  <!-- TEMPLATE: PRODUZIONE (tabs Raccolte / Lotti / Confezionamento) -->
  <template id="template-produzione">
    <div class="module-header mb-3">
      <div>
        <h2 class="module-title mb-1">Produzione Olio</h2>
        <div class="module-subtitle">Raccolte, lotti e confezionamento</div>
      </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs produzione-tabs mb-4">
      <li class="nav-item">
        <button class="nav-link active" id="tab-raccolte" type="button">
          <i class="fa-solid fa-hands-holding me-1"></i> Raccolte
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tab-lotti" type="button">
          <i class="fa-solid fa-bottle-droplet me-1"></i> Lotti Olio
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tab-confezionamento" type="button">
          <i class="fa-solid fa-wine-bottle me-1"></i> Confezionamento
        </button>
      </li>
    </ul>

    <div id="produzione-content"></div>
  </template>

  <!-- TEMPLATE: RACCOLTE LISTA -->
  <template id="template-raccolte-lista">
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-accent" id="btn-nuova-raccolta">
        <i class="fa-solid fa-plus me-1"></i> Nuova Raccolta
      </button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-raccolte">0</div>
          <div class="stat-label">Raccolte</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-kg-olive">0</div>
          <div class="stat-label">Kg Olive</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-media-kg">0</div>
          <div class="stat-label">Media Kg</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-value" id="stat-costo-raccolte">0</div>
          <div class="stat-label">Costo Totale</div>
        </div>
      </div>
    </div>

    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Anno Campagna</label>
          <select class="form-select form-select-sm" id="filtro-raccolte-anno">
            <option value="">Tutti</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label small">Parcella</label>
          <select class="form-select form-select-sm" id="filtro-raccolte-parcella">
            <option value="">Tutte</option>
          </select>
        </div>
        <div class="col-md-4">
          <button class="btn btn-outline-secondary btn-sm w-100" id="btn-filtra-raccolte">
            <i class="fa-solid fa-filter me-1"></i> Filtra
          </button>
        </div>
      </div>
    </div>

    <div class="card p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>Codice</th>
              <th>Data</th>
              <th>Parcelle</th>
              <th>Kg Olive</th>
              <th>Metodo</th>
              <th>Maturazione</th>
              <th>Costo</th>
              <th>Lotto</th>
              <th>Resa</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="raccolte-tbody"></tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- TEMPLATE: RACCOLTA FORM -->
  <template id="template-raccolta-form">
    <div class="mb-3">
      <button class="btn btn-outline-secondary btn-sm" id="btn-torna-raccolte">
        <i class="fa-solid fa-arrow-left me-1"></i> Torna alle raccolte
      </button>
    </div>

    <h3 class="module-title mb-3" id="form-raccolta-titolo">Nuova Raccolta</h3>

    <form id="raccolta-form">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card p-3">
            <h5 class="card-section-title mb-3">Dati Raccolta</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Codice *</label>
                <input type="text" class="form-control form-control-sm" id="r-codice" required placeholder="R2026-001" />
              </div>
              <div class="col-6">
                <label class="form-label">Data Raccolta *</label>
                <input type="date" class="form-control form-control-sm" id="r-data" required />
              </div>
              <div class="col-6">
                <label class="form-label">Anno Campagna *</label>
                <input type="number" class="form-control form-control-sm" id="r-anno" required value="2026" />
              </div>
              <div class="col-6">
                <label class="form-label">Kg Olive Totali *</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="r-kg-totali" required />
              </div>
              <div class="col-6">
                <label class="form-label">Metodo Raccolta *</label>
                <select class="form-select form-select-sm" id="r-metodo" required>
                  <option value="">Seleziona...</option>
                  <option value="manuale">Manuale</option>
                  <option value="meccanico">Meccanico</option>
                  <option value="misto">Misto</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Maturazione *</label>
                <select class="form-select form-select-sm" id="r-maturazione" required>
                  <option value="">Seleziona...</option>
                  <option value="verde">Verde</option>
                  <option value="invaiato">Invaiato</option>
                  <option value="maturo">Maturo</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Note</label>
                <textarea class="form-control form-control-sm" id="r-note" rows="2"></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card p-3 mb-3">
            <h5 class="card-section-title mb-3">Parcelle Raccolte</h5>
            <div id="raccolta-parcelle-container"></div>
          </div>

          <div class="card p-3">
            <h5 class="card-section-title mb-3">Costi Raccolta</h5>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">N. Operai</label>
                <input type="number" class="form-control form-control-sm" id="r-num-operai" />
              </div>
              <div class="col-6">
                <label class="form-label">Ore Lavoro</label>
                <input type="number" step="0.5" class="form-control form-control-sm" id="r-ore-lavoro" />
              </div>
              <div class="col-6">
                <label class="form-label">Costo Manodopera (&euro;)</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="r-costo-manodopera" />
              </div>
              <div class="col-6">
                <label class="form-label">Costo Noleggio (&euro;)</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="r-costo-noleggio" />
              </div>
              <div class="col-12">
                <label class="form-label">Costo Totale Raccolta (&euro;)</label>
                <input type="number" step="0.01" class="form-control form-control-sm" id="r-costo-totale" />
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-accent flex-grow-1">
              <i class="fa-solid fa-floppy-disk me-1"></i> Salva
            </button>
            <button type="button" class="btn btn-outline-secondary" id="btn-annulla-raccolta">
              Annulla
            </button>
          </div>
        </div>
      </div>
    </form>
  </template>

  <!-- TEMPLATE: LOTTI LISTA -->
  <template id="template-lotti-lista">
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-accent" id="btn-nuovo-lotto">
        <i class="fa-solid fa-plus me-1"></i> Nuovo Lotto
      </button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col">
        <div class="stat-card">
          <div class="stat-value" id="stat-lotti">0</div>
          <div class="stat-label">Lotti</div>
        </div>
      </div>
      <div class="col">
        <div class="stat-card">
          <div class="stat-value" id="stat-kg-olive-lotti">0</div>
          <div class="stat-label">Kg Olive</div>
        </div>
      </div>
      <div class="col">
        <div class="stat-card">
          <div class="stat-value" id="stat-litri">0</div>
          <div class="stat-label">Litri Olio</div>
        </div>
      </div>
      <div class="col">
        <div class="stat-card">
          <div class="stat-value" id="stat-kg-olio">0</div>
          <div class="stat-label">Kg Olio</div>
        </div>
      </div>
      <div class="col">
        <div class="stat-card">
